<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zamp AI SDR — Dashboard</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem("theme");
        document.documentElement.dataset.theme = t === "light" || t === "dark" ? t : "dark";
      } catch (e) {
        document.documentElement.dataset.theme = "dark";
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto+Mono:wght@400&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app-shell"></div>
  <main class="app-main">
    <div class="content">
      <p class="muted">Performance across all research runs.</p>

      <div id="metrics-error" class="banner banner--red" hidden></div>

      <div class="metric-cards">
        <div class="metric-card">
          <div class="metric-card__label">Human Acceptance</div>
          <div class="metric-card__value" id="metric-acceptance">—</div>
          <div class="metric-card__sub" id="metric-acceptance-sub"></div>
        </div>
        <div class="metric-card">
          <div class="metric-card__label">Groundedness</div>
          <div class="metric-card__value" id="metric-groundedness">—</div>
          <div class="metric-card__sub" id="metric-groundedness-sub"></div>
        </div>
        <div class="metric-card">
          <div class="metric-card__label">Escalation Rate</div>
          <div class="metric-card__value" id="metric-escalation">—</div>
          <div class="metric-card__sub" id="metric-escalation-sub"></div>
        </div>
        <div class="metric-card">
          <div class="metric-card__label">Avg. Time-to-Draft</div>
          <div class="metric-card__value" id="metric-time">—</div>
          <div class="metric-card__sub"></div>
        </div>
        <div class="metric-card">
          <div class="metric-card__label">Personalization</div>
          <div class="metric-card__value" id="metric-depth">—</div>
          <div class="metric-card__sub"></div>
        </div>
      </div>

      <div class="section-header">
        <h2>Recent Runs</h2>
        <a href="run-list.html" class="section-header__link">View all runs →</a>
      </div>

      <div id="recent-runs-error" class="banner banner--red" hidden></div>

      <table class="data-table" id="recent-runs-table">
        <thead>
          <tr>
            <th>Prospect</th>
            <th>Company</th>
            <th>Status</th>
            <th>Signal detected</th>
            <th>Confidence</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="recent-runs-body">
          <tr class="table-loading-row"><td colspan="5">Loading runs…</td></tr>
        </tbody>
      </table>
    </div>
  </main>
  <script type="module">
    import { renderLayout } from "./js/layout.js";
    renderLayout({ active: "dashboard", title: "Dashboard" });
  </script>
  <script type="module" src="js/dashboard.js"></script>
</body>
</html>
