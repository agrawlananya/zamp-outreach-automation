<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zamp AI SDR — New Research</title>
  <script>
    (function () {
      try {
        var t = localStorage.getItem("theme");
        document.documentElement.dataset.theme = t === "light" || t === "dark" ? t : "dark";
      } catch (e) {
        document.documentElement.dataset.theme = "dark";
      }
    })();
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Roboto+Mono:wght@400&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/@phosphor-icons/web"></script>
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app-shell"></div>
  <main class="app-main">
    <div class="content content--centered">
      <div class="card card--intake">
        <div class="intake-eyebrow">Prospect intake</div>
        <h1>Research a new prospect</h1>
        <p class="muted">We scan public sources, extract signals, and draft only what we can ground.</p>
        <form id="intake-form">
          <label for="name">Prospect name</label>
          <input type="text" id="name" name="name" required />

          <div class="form-row">
            <div class="form-row__field">
              <label for="title">Title</label>
              <input type="text" id="title" name="title" required />
            </div>
            <div class="form-row__field">
              <label for="company_name">Company</label>
              <input type="text" id="company_name" name="company_name" required />
            </div>
          </div>

          <div id="error-box" class="error-box" hidden></div>

          <button type="submit" id="submit-button" class="btn btn--primary">Start Research</button>
        </form>
      </div>
      <p class="intake-pipeline-hint">8-stage pipeline: Intake &rsaquo; Web Research &rsaquo; Signal Extract &rsaquo; Validate &rsaquo; Persona &rsaquo; Hook Score &rsaquo; Draft &rsaquo; QA</p>
    </div>
  </main>
  <script type="module">
    import { renderLayout } from "./js/layout.js";
    renderLayout({ active: "new-research", title: "New Research" });
  </script>
  <script type="module" src="js/intake.js"></script>
</body>
</html>
