<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Zamp AI SDR — Run</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="css/tokens.css" />
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <div id="app-shell"></div>
  <main class="app-main">
    <div class="content">
      <span id="fixture-badge" class="badge badge--fixture" hidden>Fixture: reproducible research</span>

      <div id="live-phase" hidden>
        <div class="run-header">
          <div class="run-header__left">
            <div class="run-header__avatar" id="run-avatar"></div>
            <div class="run-header__identity">
              <div class="run-header__name-row">
                <span class="run-header__name" id="run-name"></span>
                <span class="badge badge--info"><span class="badge__dot"></span>RUNNING</span>
              </div>
              <div class="run-header__meta muted" id="run-meta"></div>
            </div>
          </div>
          <div class="run-header__right">
            <span class="run-header__stage-count" id="run-stage-count"></span>
            <button type="button" id="view-logs-btn" class="btn btn--secondary btn--small">View Logs</button>
          </div>
        </div>

        <div id="logs-panel" class="card logs-panel" hidden>
          <h2>Audit Log</h2>
          <table class="data-table">
            <thead>
              <tr><th>Stage</th><th>Status</th><th>Latency</th><th>Time</th></tr>
            </thead>
            <tbody id="logs-body"></tbody>
          </table>
        </div>

        <div class="run-columns">
          <section class="card pipeline-card">
            <h2>Execution Pipeline</h2>
            <div id="pipeline-list"></div>
          </section>
          <section class="card signals-card">
            <h2>Contextual Signals</h2>
            <div id="signals-list"></div>
          </section>
        </div>
      </div>

      <div id="review-phase" hidden>
        <div id="status-banner" class="banner" hidden></div>
        <div id="role-confirmation-note" class="muted" hidden></div>
        <div class="review-layout">
          <section class="card draft-panel">
            <h2>Draft</h2>
            <label for="draft-subject">Subject</label>
            <input type="text" id="draft-subject" />
            <label for="draft-body">Body</label>
            <textarea id="draft-body" rows="8"></textarea>

            <div id="reject-reason-box" class="reject-reason-box" hidden>
              <label for="reject-reason">Reason for rejection</label>
              <input type="text" id="reject-reason" />
            </div>

            <div class="actions">
              <button id="approve-btn" class="btn btn--primary">Approve</button>
              <button id="approve-edits-btn" class="btn">Approve with Edits</button>
              <button id="reject-btn" class="btn btn--danger">Reject</button>
            </div>
            <div id="decision-confirmation" class="confirmation" hidden>Decision recorded.</div>

            <div id="annotated-body" class="annotated-body" hidden></div>
          </section>

          <section class="card reasoning-panel">
            <h2>Reasoning Trail</h2>
            <div id="reasoning-trail"></div>
          </section>
        </div>
      </div>

      <div id="load-error" class="card card--narrow" hidden></div>
    </div>
  </main>
  <script type="module">
    import { renderLayout } from "./js/layout.js";
    renderLayout({ active: "", title: "Run Detail" });
  </script>
  <script type="module" src="js/run-view.js?v=3"></script>
</body>
</html>
